name: Release Single File Binary

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v1.0.0"
        required: true
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      PUBLISH_DIR: TaskManager/bin/Publish/win-x64-single

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and publish single-file executable
        shell: pwsh
        run: |
          $env:DOTNET_CLI_HOME = Join-Path $env:GITHUB_WORKSPACE ".dotnet"
          $env:NUGET_PACKAGES = Join-Path $env:GITHUB_WORKSPACE ".nuget"

          dotnet publish "TaskManager\TaskManager.csproj" `
            -p:PublishProfile=Properties\PublishProfiles\SingleFile-win-x64.pubxml

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          $assetName = "TaskManager-$tag-win-x64-single.zip"
          $releaseName = "TaskManager $tag"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT

      - name: Create zip asset
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE $env:PUBLISH_DIR
          if (-not (Test-Path $publishDir)) {
            throw "Publish output not found at $publishDir"
          }

          $stagingDir = Join-Path $env:RUNNER_TEMP "release-staging"
          $zipPath = Join-Path $env:RUNNER_TEMP "${{ steps.meta.outputs.asset_name }}"

          if (Test-Path $stagingDir) {
            Remove-Item -LiteralPath $stagingDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stagingDir | Out-Null
          Copy-Item -LiteralPath (Join-Path $publishDir "TaskManager.exe") -Destination $stagingDir
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "README.md") -Destination $stagingDir

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $zipPath

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $releaseName = "${{ steps.meta.outputs.release_name }}"
          $zipPath = Join-Path $env:RUNNER_TEMP "${{ steps.meta.outputs.asset_name }}"
          $notes = @"
          Standalone Windows x64 single-file build of TaskManager.
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $args = @(
              "release", "create", $tag,
              $zipPath,
              "--title", $releaseName,
              "--notes", $notes
            )

            if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.prerelease }}" -eq "true") {
              $args += "--prerelease"
            }

            & gh @args
          } else {
            gh release upload $tag $zipPath --clobber
          }
